name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci/python.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci/python.yml'

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout sibling pypitui
        uses: actions/checkout@v4
        with:
          repository: jeremysball/pypitui
          ref: v2
          path: pypitui

      - name: Link sibling pypitui
        run: ln -sfn "$GITHUB_WORKSPACE/pypitui" "$GITHUB_WORKSPACE/../pypitui"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run ruff check
        run: uv run ruff check src/

      - name: Run mypy (strict)
        run: uv run mypy src/ --strict

      - name: Run radon (complexity check)
        run: |
          echo "Checking code complexity..."
          uv run radon cc src/ --min=F -s || true
          echo "Complexity check complete (fails on grade F only)"

      - name: Run vulture (dead code check)
        run: uv run vulture src/ --min-confidence 80

      - name: Check completions sync
        run: uv run python scripts/generate-static-completions.py --check

      - name: Run pytest
        env:
          OPENAI_API_KEY: test
          KIMI_API_KEY: test
          KIMI_BASE_URL: https://example.invalid
          TELEGRAM_BOT_TOKEN: test
        run: uv run pytest
