# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.9.10
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict)
        entry: uv run mypy src/ --strict
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: radon
        name: radon (complexity check)
        entry: bash -c 'output=$(uv run radon cc src/ -n C -s); if [ -n "$output" ]; then echo "$output"; exit 1; fi'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: vulture
        name: vulture (dead code check)
        entry: uv run vulture src/ --min-confidence 80
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
