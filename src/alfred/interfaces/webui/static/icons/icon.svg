<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  
  <!-- Butlers Bow Tie / A shape -->
  <g fill="white" transform="translate(256, 256)">
    <!-- Left wing -->
    <path d="M-120 -60 Q-160 -80 -140 -20 L-80 40 Q-60 60 -40 40 L-20 20 Q0 0 -20 -20 L-60 -40 Q-90 -50 -120 -60 Z"/>
    <!-- Right wing -->
    <path d="M120 -60 Q160 -80 140 -20 L80 40 Q60 60 40 40 L20 20 Q0 0 20 -20 L60 -40 Q90 -50 120 -60 Z"/>
    <!-- Center knot -->
    <circle cx="0" cy="0" r="35"/>
    <!-- Center A stem -->
    <rect x="-8" y="-80" width="16" height="160" rx="8"/>
    <!-- Center A crossbar -->
    <rect x="-40" y="-20" width="80" height="16" rx="8"/>
  </g>
</svg>