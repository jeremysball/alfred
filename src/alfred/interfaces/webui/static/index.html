<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Alfred Web UI</title>
    <link rel="stylesheet" href="/static/css/base.css?v=3">
    <link rel="stylesheet" href="/static/css/themes.css?v=3">
    <link rel="stylesheet" href="/static/css/themes/dark-academia.css?v=3">
    <link rel="stylesheet" href="/static/css/themes/swiss-international.css?v=3">
    <link rel="stylesheet" href="/static/css/themes/neumorphism.css?v=3">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="header-brand">
                <h1>Alfred</h1>
                <span id="connection-pill" class="connection-pill disconnected">●</span>
            </div>
            <div class="header-status">
                <div id="streaming-dot" class="streaming-dot hidden" title="Generating response..."></div>
                <div id="queue-badge" class="queue-badge hidden">0</div>
                <settings-menu></settings-menu>
            </div>
        </header>

        <toast-container id="toast-container"></toast-container>

        <main class="app-main">
            <div id="chat-container" class="chat-container">
                <div id="message-list" class="message-list">
                    <!-- Messages will be inserted here -->
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <div id="input-area" class="input-area">
                <div class="input-history-controls mobile-only">
                    <button id="history-up" class="history-btn" title="Previous message" aria-label="Previous message">
                        <span>↑</span>
                    </button>
                    <button id="history-down" class="history-btn" title="Next message" aria-label="Next message">
                        <span>↓</span>
                    </button>
                </div>
                <div class="input-wrapper">
                    <textarea
                        id="message-input"
                        class="message-input"
                        placeholder="Type your message... (Shift+Enter to queue)"
                        autocomplete="off"
                        rows="1"
                    ></textarea>
                    <completion-menu id="completion-menu" visible="false"></completion-menu>
                </div>
                <button id="send-button" class="send-button">Send</button>
            </div>
        </footer>
    </div>

    <!-- Web Components -->
    <script src="/static/js/components/theme-selector.js?v=3"></script>
    <script src="/static/js/components/chat-message.js?v=3"></script>
    <script src="/static/js/components/tool-call.js?v=3"></script>
    <script src="/static/js/components/completion-menu.js?v=3"></script>

    <!-- Markdown and Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script src="/static/js/websocket-client.js?v=3"></script>
    <script src="/static/js/main.js?v=3"></script>
</body>
</html>
